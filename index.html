<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Signal Below</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="game-shell" aria-label="Signal Below game">
      <canvas id="game" width="1280" height="720"></canvas>
      <section class="hud" aria-live="polite">
        <div class="brand">
          <span class="mark"></span>
          <span>Signal Below</span>
        </div>
        <div class="meter" aria-label="Signal power">
          <span id="signalFill"></span>
        </div>
        <div class="readouts">
          <span id="fragmentReadout">Fragments 0/3</span>
          <span id="statusReadout">Sweep the archive</span>
          <span id="objectiveReadout">Trace memory signal</span>
        </div>
      </section>
      <section class="journal" aria-label="Recovered evidence">
        <div class="journal-header">
          <span>Evidence</span>
          <span id="journalCount">0/3</span>
        </div>
        <div class="synthesis" aria-live="polite">
          <span id="synthesisTitle" class="synthesis-title">No Pattern</span>
          <span id="synthesisText" class="synthesis-text">Recover memory fragments to compare the archive's contradictions.</span>
        </div>
        <ol id="journalList" class="journal-list"></ol>
        <div class="atlas" aria-label="Survey atlas">
        <div class="atlas-header">
          <span>Atlas</span>
          <span id="atlasCount">1/5 regions</span>
        </div>
        <span id="regionName" class="region-name">South Intake</span>
        <span id="regionDetail" class="region-detail">Drowned Archive</span>
        <div class="atlas-metrics">
          <span id="regionRisk" class="region-metric">Hazard 2/5 · Settlement 3/5</span>
          <span id="routeCount" class="region-metric">3/8 routes</span>
        </div>
        <ol id="routeList" class="route-list"></ol>
        <ol id="landmarkList" class="landmark-list"></ol>
      </div>
      </section>
      <button id="restartButton" class="restart" type="button">Restart</button>
    </main>
    <script type="module" src="./src/game.js"></script>
  </body>
</html>
