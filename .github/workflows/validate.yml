name: Validate Signal Below

on:
  push:
    branches: [main, "aga/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Node gameplay checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check game module syntax
        run: |
          node --check src/game-state.js
          node --check src/game.js
          node --check src/tidewalk-contact.js
      - name: Run deterministic game suites
        run: node tests/run-all.mjs
